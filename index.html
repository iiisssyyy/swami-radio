  <!-- Linkify URLs -->
<script>
function linkifyElement(el) {
  if (!el) return;

  const walker = document.createTreeWalker(
    el,
    NodeFilter.SHOW_TEXT,
    null,
    false
  );

const urlRegex = /((https?:\/\/)?([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}([\/\?\&\=\-\w\.#%]*)*)/g;
  
  let node;
  while ((node = walker.nextNode())) {
    const text = node.nodeValue;

    if (urlRegex.test(text)) {
      const span = document.createElement('span');

      span.innerHTML = text.replace(urlRegex, url => {
        let href = url.startsWith('http') ? url : 'https://' + url;

        // Special handling for y2u.be → YouTube
        if (url.startsWith('y2u.be/')) {
          const id = url.split('/')[1].replace(/[^a-zA-Z0-9_-]/g, '');
          href = `https://youtu.be/${id}`;
        }

        return `<a href="${href}" target="_blank" style="color:#0066cc;text-decoration:underline;">${url}</a>`;
      });

      node.parentNode.replaceChild(span, node);
    }
  }
}

function setupLinkify() {
  const listContainer = document.querySelector('.orbIL');
  if (!listContainer) return;

  // Process existing items
  listContainer.querySelectorAll('.orbILi > span, .orbILi > a')
    .forEach(linkifyElement);

  // Watch for updates
  const observer = new MutationObserver(mutations => {
    mutations.forEach(m => {
      m.addedNodes.forEach(node => {
        if (node.nodeType === Node.ELEMENT_NODE) {
          linkifyElement(node);
        }
      });
    });
  });

  observer.observe(listContainer, { childList: true, subtree: true });
}

// Wait for widget
const checkWidgetReady = setInterval(() => {
  const el = document.querySelector('.orbIL');
  if (el && el.children.length > 0) {
    clearInterval(checkWidgetReady);
    setupLinkify();
  }
}, 500);
</script>
