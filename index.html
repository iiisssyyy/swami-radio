<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bhakti Radio Stream</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #222;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
    }

    /* Faint background logo */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("https://bhaktisf.com/fav/favicon.svg") center/320px no-repeat;
      opacity: 0.05;
      z-index: 0;
      pointer-events: none;
    }

    h1 {
      margin: 30px 0 20px;
      font-weight: 600;
      z-index: 1;
    }

    .widget-container {
      width: 100%;
      max-width: 900px;
      padding: 0 20px;
      z-index: 1;
    }

    @media (min-width: 768px) {
      .widget-container {
        max-width: 1000px;
      }
    }

    footer {
      margin-top: auto;
      padding: 20px;
      font-size: 14px;
      z-index: 1;
    }

    footer a {
      margin: 0 10px;
      color: #444;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* Hide ORB logo button */
    .orbLh {
      display: none !important;
    }

    /* Remove red border/background ONLY */
    .orbL {
      border: none !important;
      background: transparent !important;
    }

    .orbLt {
      background: transparent !important;
    }

    .orbLtn {
      color: #222 !important;
    }

    .orbIL,
    .orbILs {
      background: transparent !important;
    }

    /* ✅ ONLY fix truncation (don’t touch layout!) */
    .orbILi > a,
    .orbILi > span {
      white-space: normal !important;
      text-overflow: unset !important;
    }
  </style>
</head>

<body>

  <h1>Bhakti Radio Stream</h1>

  <div class="widget-container">

    <!--OnlineRadioBox Playlist widget-->
    <div class="orbL cmpct" id="orb_pl_a5ed1a5e0769a99">

      <!-- KEEP original widget styles intact -->
      <style>
        .orbL{position:relative;box-sizing:border-box;overflow:hidden;font-weight:normal;border:1px solid;text-align:left}
        .orbL br,.orbL>br{display:none!important;}
        .orbL p,.orbL>p{margin:0!important;padding:0!important;line-height:normal!important;font-size:inherit!important}
        .orbLh{display:block;position:absolute;z-index:100;top:22px;right:10px;margin-top:-12px;width:21px;text-decoration:none!important;cursor:pointer}
        .orbLh>img{height:24px!important}
        .orbLt{display:block;box-sizing:border-box;overflow:hidden;padding-left:10px!important;line-height:44px!important;min-height:44px;text-decoration:none!important}
        .orbLti{float:left!important;margin:10px 10px 10px 0!important;height:24px!important;width:44px!important}
        .orbLtn{display:block;margin-right:54px!important;font-size:14px!important;font-weight:bold;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
        .orbIL{position:relative;overflow:auto;margin:0!important;padding:0!important;list-style:none!important;height:172px}
        .orbILi{padding:0 10px!important;list-style:none!important}
        .orbILi>a,.orbILi>span{display:block!important;line-height:32px!important;font-size:14px!important;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
        .orbILi>a>time,.orbILi>span>time{display:inline-block;font-size:12px!important;width:3em}
        .orbILi+li{border-style:solid!important;border-width:1px 0 0!important}
      </style>

      <a class="orbLh" href="https://onlineradiobox.com/us/" target="_blank">
        <img src="//ecdn.onlineradiobox.com/img/wl.svg" alt="">
      </a>

      <a class="orbLt" href="https://onlineradiobox.com/us/bhagavatamreader/" target="_blank">
        <img class="orbLti" src="//cdn.onlineradiobox.com/img/logo/0/119920.png" alt="">
        <span class="orbLtn">Bhagavatam Reader</span>
      </a>

      <script>
        var orbpl_w = orbpl_w || { lang: "en-us" };
        orbpl_w.cmd = orbpl_w.cmd || [];
        orbpl_w.cmd.push(function() {
          orbpl_w.init("orb_pl_a5ed1a5e0769a99");
        });

        var s = document.createElement('script');
        s.src = "//ecdn.onlineradiobox.com/js/plwidget.min.a1649ec0.js";
        document.body.appendChild(s);
      </script>
    </div>
    <!--OnlineRadioBox Playlist widget-->

  </div>

  <footer>
    <a href="https://bhaktisf.com" target="_blank">bhaktisf.com</a> |
    <a href="https://krishna.com" target="_blank">krishna.com</a>
  </footer>

  <!-- Linkify URLs -->
  <script>
    function linkifyText(element) {
      const urlPattern = /(https?:\/\/[^\s]+)/g;
      element.innerHTML = element.innerHTML.replace(urlPattern, function(url) {
        return '<a href="' + url + '" target="_blank" style="color:#0066cc;text-decoration:underline;">' + url + '</a>';
      });
    }

    function applyLinkify() {
      const items = document.querySelectorAll('.orbILi > a, .orbILi > span');
      items.forEach(el => linkifyText(el));
    }

    setTimeout(applyLinkify, 1500);
    setInterval(applyLinkify, 5000);
  </script>

</body>
</html>
