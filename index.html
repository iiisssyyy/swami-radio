<script>
const button = document.getElementById('playButton');
const publicStream = "http://73.162.196.183:8000/stream";
const localStream = "http://10.0.0.156:8000/stream";
const homePublicIP = "73.162.196.183";

let cachedIP = null;

function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}

async function getPublicIP(timeout = 2000) {
  try {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), timeout);

    const res = await fetch("https://api.ipify.org?format=json", {
      signal: controller.signal
    });

    clearTimeout(id);

    if (!res.ok) return null;

    const data = await res.json();
    return data.ip;
  } catch {
    return null;
  }
}

// Preload IP
getPublicIP().then(ip => {
  cachedIP = ip;
});

button.addEventListener('click', () => {
  let streamToUse = (cachedIP === homePublicIP || !cachedIP)
    ? localStream
    : publicStream;

  if (isIOS()) {
    const newTab = window.open("about:blank", "_blank");
    if (newTab) newTab.location.href = streamToUse;
    return;
  }

  // ✅ Chrome-safe method: simulate real link click
  const a = document.createElement("a");
  a.href = streamToUse;
  a.target = "_blank";
  a.rel = "noopener noreferrer";

  // Required for Firefox
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
});
</script>

<script>
function linkifyElement(el) {
  if (!el || el.dataset.linkified) return;
  el.dataset.linkified = "true";

  const text = el.textContent;

  // ONLY match clck.ru or y2u.be (no leading junk like ***)
  const urlRegex = /\b(clck\.ru\/[^\s*]+|y2u\.be\/[^\s*]+)/g;

  if (!urlRegex.test(text)) return;

  const span = document.createElement('span');

  span.innerHTML = text.replace(urlRegex, url => {
    let href = "https://" + url;

    if (url.startsWith('y2u.be/')) {
      const id = url.split('/')[1].replace(/[^a-zA-Z0-9_-]/g, '');
      href = `https://youtu.be/${id}`;
    }

    return `<a href="${href}" target="_blank" style="color:#0066cc;text-decoration:underline;">${url}</a>`;
  });

  el.innerHTML = span.innerHTML;
}

// polling
setInterval(() => {
  document.querySelectorAll('.orbILi > span:not([data-linkified]), .orbILi > a:not([data-linkified])')
    .forEach(linkifyElement);
}, 2000);
</script>
